name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Bandit
        run: |
          bandit -r app -q

      - name: pip-audit
        run: |
          pip-audit -r pyproject.toml

      - name: Pytest
        env:
          SENTINELSYNC_DB_PATH: ./ci-test.db
          SENTINELSYNC_LOG_LEVEL: WARNING
        run: |
          pytest -q